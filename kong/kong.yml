_format_version: "3.0"
_transform: true

services:
  - name: backend-service
    url: http://backend-app:3000
    routes:
      - name: backend-route
        paths:
          - /api
        strip_path: false
    # Cấu hình Plugin CORS cực kỳ quan trọng để Frontend không bị chặn
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:5173
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - Authorization
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600